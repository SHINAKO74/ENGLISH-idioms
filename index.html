// ── CLOUD SYNC (JSONBin) ──
const JBIN_KEY='$2a$10$oO5He7JXGf.YR.vTQWfLeuJYkkBMdwZDqhiY1JVTUJXWZLHu55NzS';
const JBIN_BASE='https://api.jsonbin.io/v3/b';
let jbinId=localStorage.getItem('lex_exam_jbin_id')||null;
let isSyncing=false,syncTimer=null;
async function jbinFetch(method,url,body){
  const opts={method,headers:{'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Private':'true'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  if(!r.ok)throw new Error(r.status);
  return r.json();
}
async function syncSave(){
  if(isSyncing)return;isSyncing=true;
  const data={history:history.slice(0,2500),failData,wordStats};
  try{
    if(!jbinId){const res=await jbinFetch('POST',JBIN_BASE,data);jbinId=res.metadata.id;localStorage.setItem('lex_exam_jbin_id',jbinId);}
    else{await jbinFetch('PUT',`${JBIN_BASE}/${jbinId}`,data);}
  }catch(e){console.warn('sync save:',e);}
  finally{isSyncing=false;}
}
async function syncLoad(){
  if(!jbinId)return false;
  try{
    const res=await jbinFetch('GET',`${JBIN_BASE}/${jbinId}/latest`);
    const d=res.record;
    if(d.history)history=d.history;
    if(d.failData)Object.assign(failData,d.failData);
    // ④ lastResult / mastered / consecutiveCorrect はローカルを優先
    if(d.wordStats){
      for(const[key,remote]of Object.entries(d.wordStats)){
        if(!wordStats[key]){
          wordStats[key]=remote;
        } else {
          const local=wordStats[key];
          // ローカルにあるキー重要3項目はローカル優先、残りはクラウドで補完
          wordStats[key]=Object.assign({},remote,{
            lastResult:local.lastResult,
            mastered:local.mastered,
            consecutiveCorrect:local.consecutiveCorrect
          });
        }
      }
    }
    try{localStorage.setItem('lex_exam_history',JSON.stringify(history));}catch(e){}
    saveFailData();saveWordStats();return true;
  }catch(e){console.warn('sync load:',e);return false;}
}
function scheduleSave(){clearTimeout(syncTimer);syncTimer=setTimeout(syncSave,2000);}

if(window.speechSynthesis)window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=speechRate;u.volume=speechVolume;
  const vs=window.speechSynthesis.getVoices();
  const v=vs.find(x=>x.lang==='en-US')||vs.find(x=>x.lang.startsWith('en'));
  if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}

function sortByDifficulty(pool){
  const shuffle=arr=>{for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;};
  const wrong  =shuffle(pool.filter(c=>wordStats[c.en]?.lastResult==='unknown'));
  const unseen =shuffle(pool.filter(c=>!wordStats[c.en]?.lastResult));
  const correct=shuffle(pool.filter(c=>wordStats[c.en]?.lastResult==='know'||wordStats[c.en]?.lastResult==='master'));
  return [...wrong,...unseen,...correct];
}

function getPool(){
  let pool=[...PHRASES];
  if(currentCatFilter!=='all') pool=pool.filter(c=>c.cat===currentCatFilter);
  if(currentLvFilter!=='all') pool=pool.filter(c=>c.level===currentLvFilter);
  return pool;
}

function initDeck(){
  let pool=getPool();
  if(currentMode==='review'){
    // ④ 苦手度1以上かつ未習得を対象。ゼロなら全単語にフォールバック
    const hard=pool.filter(c=>!wordStats[c.en]?.mastered&&(failData[c.en]||0)>=1);
    pool=hard.length?hard:pool.filter(c=>!wordStats[c.en]?.mastered);
    if(!pool.length)pool=getPool();
    // ② 復習モードは通常の3グループ分類のあとfailData多い順で上書きソート
    pool=sortByDifficulty(pool);
    pool=pool.sort((a,b)=>(failData[b.en]||0)-(failData[a.en]||0));
  } else {
    pool=sortByDifficulty(pool);
  }
  if(pool.length>sessionSize)pool=pool.slice(0,sessionSize);
  cards=pool;currentIndex=0;cardState=0;
  scoreKnow=scoreUnknown=scoreMaster=0;
  Object.keys(wordStats).forEach(k=>{wordStats[k].firstAttemptInSession=true;});
  clearProgress();
  document.getElementById('complete-screen').classList.remove('visible');
  document.getElementById('card-wrap').classList.remove('hidden');
  document.getElementById('action-row').classList.remove('hidden');
  updateUI();renderCard();
}

function renderCard(){
  if(currentIndex>=cards.length){showComplete();return;}
  const c=cards[currentIndex];
  const stat=wordStats[c.en];
  document.getElementById('card-num').textContent=`${currentIndex+1} / ${cards.length}`;

  // ③ ステータスバッジ
  const badge=document.getElementById('status-badge');
  badge.className='status-badge';
  if(stat?.mastered){
    badge.classList.add('st-master');badge.textContent='★ 習得済み';
  } else if(stat?.lastResult==='know'||stat?.lastResult==='master'){
    badge.classList.add('st-know');badge.textContent='○ 前回正解';
  } else if(stat?.lastResult==='unknown'){
    badge.classList.add('st-unknown');badge.textContent='✕ 前回不正解';
  } else {
    badge.classList.add('st-new');badge.textContent='NEW';
  }
  document.getElementById('state-dots').innerHTML=Array.from({length:4},(_,i)=>`<div class="dot${i===cardState?' active':''}"></div>`).join('');
  const content=document.getElementById('card-content');
  const catLabel={verb:'動詞句',prep:'前置詞句',adj:'形容詞構文',conj:'接続詞的',adv:'副詞句'}[c.cat]||c.cat;
  const lvLabel={basic:'共通テスト',standard:'標準',advanced:'発展'}[c.level]||c.level;
  let html='';
  if(cardState===0){
    html=`<div class="s-header-row"><div class="s-cat">${catLabel}</div><div class="s-level lv-${c.level}">${lvLabel}</div></div><div class="s-phrase">${c.en}</div><button class="speak-btn" id="speak-btn">🔊</button><div class="hint-text">タップして意味を確認</div>`;
  } else if(cardState===1){
    html=`<div class="s-label">意味</div><div class="s-ja">${c.ja}</div><div class="s-pos">${catLabel} — ${c.pos}</div><div class="hint-text">タップして例文を確認</div>`;
  } else if(cardState===2){
    const enLen=c.exEn.length;
    const jaLen=c.exJa.length;
    const enSize=enLen<=40?21:enLen<=60?18:enLen<=80?16:14;
    const jaSize=jaLen<=20?16:jaLen<=35?15:jaLen<=50?14:13;
    html=`<div class="s-ex-label">例文</div><div class="s-ex-en" style="font-size:${enSize}px">"${c.exEn}"</div><div class="s-ex-ja" style="font-size:${jaSize}px">「${c.exJa}」</div><button class="speak-btn" id="speak-ex-btn">🔊</button><div class="hint-text">タップして試験ポイントを確認</div>`;
  } else {
    const p=POINT[c.en];
    html=`<div class="s-tip-label">試験ポイント</div><div class="s-tip-content">${p.tip}</div><div class="s-tip-divider"></div><div class="s-sim-label">同義表現</div><div class="s-sim-content">${p.similar}</div><div class="s-tip-divider"></div><div class="s-cau-label">注意点</div><div class="s-cau-content">${p.caution}</div>`;
  }
  content.innerHTML=html;
  const sb=document.getElementById('speak-btn');
  if(sb){
    sb.addEventListener('click',e=>{e.stopPropagation();speak(c.en);});
    sb.addEventListener('touchend',e=>{e.stopPropagation();speak(c.en);},{passive:true});
  }
  const sbex=document.getElementById('speak-ex-btn');
  if(sbex){
    sbex.addEventListener('click',e=>{e.stopPropagation();speak(c.exEn);});
    sbex.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();speak(c.exEn);},{passive:false});
  }
}

function advanceState(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  const c=cards[currentIndex];if(!c)return;
  cardState=(cardState+1)%4;
  const content=document.getElementById('card-content');
  content.style.animation='none';void content.offsetWidth;content.style.animation='fadeSlideIn 0.22s ease';
  renderCard();
}

function grade(known){
  const c=cards[currentIndex];
  if(!wordStats[c.en])wordStats[c.en]={consecutiveCorrect:0,mastered:false,firstAttemptInSession:true};
  const stat=wordStats[c.en];
  let result;
  if(known){
    stat.consecutiveCorrect++;
    stat.firstAttemptInSession=false;
    const nowMasters=stat.consecutiveCorrect>=2;
    if(nowMasters&&!stat.mastered){
      stat.mastered=true;scoreMaster++;
      if(seEnabled){resumeAC();seMaster();}
    } else {
      if(seEnabled){resumeAC();seCorrect();}
    }
    // ③ 正解時に苦手度-1（0以下にはならない）
    if(failData[c.en]>0){failData[c.en]--;saveFailData();}
    result=stat.mastered?'master':'know';scoreKnow++;
  }else{
    stat.consecutiveCorrect=0;
    stat.firstAttemptInSession=false;
    if(stat.mastered){stat.mastered=false;scoreMaster=Math.max(0,scoreMaster-1);}
    if(seEnabled){resumeAC();seWrong();}
    result='unknown';scoreUnknown++;
    // ① 不正解時に苦手度+1
    failData[c.en]=(failData[c.en]||0)+1;saveFailData();
  }
  // ⑤ lastResultを常に保存
  stat.lastResult=result;
  saveWordStats();
  history.unshift({en:c.en,ja:c.ja,pos:c.pos,cat:c.cat,level:c.level,result,time:Date.now()});
  try{localStorage.setItem('lex_exam_history',JSON.stringify(history.slice(0,2500)));}catch(e){}
  history=history.slice(0,2500);
  scheduleSave();
  window.speechSynthesis&&window.speechSynthesis.cancel();
  currentIndex++;cardState=0;updateUI();renderCard();
  if(didInteract&&currentIndex<cards.length){const nc=cards[currentIndex];if(nc)speak(nc.en);}
}

function nextCard(){
  window.speechSynthesis&&window.speechSynthesis.cancel();
  currentIndex++;cardState=0;updateUI();renderCard();
  if(didInteract&&currentIndex<cards.length){const nc=cards[currentIndex];if(nc)speak(nc.en);}
}

function updateUI(){
  const total=cards.length,done=currentIndex,pct=total?Math.round(done/total*100):0;
  document.getElementById('progress-label').textContent=`${done} / ${total}`;
  document.getElementById('progress-pct').textContent=`${pct}%`;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('score-know').textContent=scoreKnow;
  document.getElementById('score-unknown').textContent=scoreUnknown;
  document.getElementById('score-master').textContent=scoreMaster;
  saveProgress();
}

function showComplete(){
  clearProgress();
  document.getElementById('complete-screen').classList.add('visible');
  document.getElementById('card-wrap').classList.add('hidden');
  document.getElementById('action-row').classList.add('hidden');
  document.getElementById('final-know').textContent=scoreKnow;
  document.getElementById('final-unknown').textContent=scoreUnknown;
  document.getElementById('final-master').textContent=scoreMaster;
}

function restart(){initDeck();}
function setMode(mode){
  currentMode=mode;
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['flash','review'][i]===mode));
  initDeck();
}
function setCatFilter(v){currentCatFilter=v;initDeck();}
function setLvFilter(v){currentLvFilter=v;initDeck();}

// ── SETTINGS ──
function openSettings(){
  document.getElementById('session-slider').value=sessionSize;
  document.getElementById('session-label').textContent=sessionSize>=871?'全語':sessionSize+'語';
  document.getElementById('vol-slider').value=speechVolume;
  document.getElementById('vol-label').textContent=Math.round(speechVolume*100)+'%';
  document.getElementById('rate-slider').value=speechRate;
  document.getElementById('rate-label').textContent=speechRate.toFixed(2)+'×';
  document.getElementById('se-toggle').checked=seEnabled;
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings(){document.getElementById('settings-panel').classList.remove('open');}
function handleSettingsBg(e){if(e.target===document.getElementById('settings-panel'))closeSettings();}
function setSessionSize(v){
  sessionSize=parseInt(v);
  localStorage.setItem('lex_exam_session',v);
  document.getElementById('session-label').textContent=sessionSize>=871?'全語':sessionSize+'語';
}
function applySessionSize(){closeSettings();initDeck();}
function setVolume(v){
  speechVolume=parseFloat(v);localStorage.setItem('lex_exam_vol',v);
  document.getElementById('vol-label').textContent=Math.round(v*100)+'%';
  const c=cards[currentIndex];if(c)speak(c.en);
}
function setRate(v){
  speechRate=parseFloat(v);localStorage.setItem('lex_exam_rate',v);
  document.getElementById('rate-label').textContent=parseFloat(v).toFixed(2)+'×';
  const c=cards[currentIndex];if(c)speak(c.en);
}
function setSeEnabled(v){seEnabled=v;localStorage.setItem('lex_exam_se',v);}
function resetProgress(){
  if(!confirm('進行状態をリセットしますか？'))return;
  clearProgress();closeSettings();initDeck();
}
function resetAll(){
  if(!confirm('習得状態・履歴・要復習データをすべて削除しますか？'))return;
  localStorage.removeItem('lex_exam_history');
  localStorage.removeItem('lex_exam_wordstats');
  localStorage.removeItem('lex_exam_fail');
  localStorage.removeItem('lex_exam_progress');
  history=[];wordStats={};failData={};
  closeSettings();initDeck();
}

// ── 習得状況パネル ──
let statusFilter='all';
let statusSort='fail';

function openStatus(){renderStatus();document.getElementById('history-panel').classList.add('open');}
function closeHistory(){document.getElementById('history-panel').classList.remove('open');}
function handlePanelBg(e){if(e.target===document.getElementById('history-panel'))closeHistory();}

function setStatusFilter(f,btn){
  statusFilter=f;
  document.querySelectorAll('.hfilter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderStatus();
}
function setStatusSort(s,btn){
  statusSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderStatus();
}

function getItemStatus(en){
  const s=wordStats[en];
  if(s?.mastered)return'master';
  if(s?.lastResult==='know'||s?.lastResult==='master')return'know';
  if(s?.lastResult==='unknown')return'unknown';
  return'new';
}

function renderStatus(){
  const lvOrder={basic:0,standard:1,advanced:2};
  const statusIcons={master:'★',know:'○',unknown:'✕',new:'—'};
  const statusLabels={master:'習得済み',know:'前回正解',unknown:'要復習',new:'未着手'};

  let items=PHRASES.map(p=>({...p,status:getItemStatus(p.en),fail:failData[p.en]||0}));

  // フィルター
  if(statusFilter!=='all') items=items.filter(i=>i.status===statusFilter);

  // ソート
  if(statusSort==='fail'){
    items.sort((a,b)=>b.fail-a.fail||a.en.localeCompare(b.en));
  } else if(statusSort==='az'){
    items.sort((a,b)=>a.en.localeCompare(b.en));
  } else if(statusSort==='level'){
    items.sort((a,b)=>(lvOrder[a.level]||0)-(lvOrder[b.level]||0)||a.en.localeCompare(b.en));
  }

  // 集計バッジ
  const all=PHRASES.length;
  const counts={master:0,know:0,unknown:0,new:0};
  PHRASES.forEach(p=>counts[getItemStatus(p.en)]++);
  document.getElementById('status-count').innerHTML=
    `全${all}語 ─ <span style="color:var(--gold)">★${counts.master}</span> `+
    `<span style="color:var(--sage)">○${counts.know}</span> `+
    `<span style="color:var(--red)">✕${counts.unknown}</span> `+
    `<span style="color:var(--muted)">NEW ${counts.new}</span>`;

  if(!items.length){
    document.getElementById('status-list').innerHTML='<div class="history-empty">該当する熟語がありません</div>';
    return;
  }

  const lvLabel={basic:'基',standard:'標',advanced:'発'};
  const lvColor={basic:'var(--sage)',standard:'var(--gold)',advanced:'var(--red)'};
  document.getElementById('status-list').innerHTML=items.map(item=>`
    <div class="history-item">
      <div class="h-badge ${item.status}">${statusIcons[item.status]}</div>
      <div style="flex:1;min-width:0">
        <div class="h-phrase">${item.en}</div>
        <div class="h-ja">${item.ja}　<span style="color:${lvColor[item.level]||'var(--muted)'};font-size:10px;opacity:0.7">${lvLabel[item.level]||''}</span></div>
      </div>
      <div class="h-fail${item.fail===0?' zero':''}">
        ${item.fail>0?`✕${item.fail}`:''}
      </div>
    </div>`).join('');
}

function exportStatus(){
  const rows=PHRASES.map(p=>({
    en:p.en,ja:p.ja,level:p.level,
    status:getItemStatus(p.en),
    fail:failData[p.en]||0,
    consecutiveCorrect:wordStats[p.en]?.consecutiveCorrect||0
  }));
  const blob=new Blob([JSON.stringify(rows,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`lexicon_exam_status_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
}

// タッチ操作
let txStart=0,tyStart=0,tMoved=false,tHandled=false;
const cardEl=document.getElementById('card');
cardEl.addEventListener('touchstart',e=>{txStart=e.touches[0].clientX;tyStart=e.touches[0].clientY;tMoved=false;tHandled=false;},{passive:true});
cardEl.addEventListener('touchmove',e=>{
  const dx=e.touches[0].clientX-txStart,dy=e.touches[0].clientY-tyStart;
  if(Math.abs(dx)>7||Math.abs(dy)>7)tMoved=true;
  if(Math.abs(dx)>20&&Math.abs(dx)>Math.abs(dy)){
    cardEl.classList.toggle('swipe-left',dx<0);cardEl.classList.toggle('swipe-right',dx>0);
  }else{cardEl.classList.remove('swipe-left','swipe-right');}
},{passive:true});
cardEl.addEventListener('touchend',e=>{
  tHandled=true;cardEl.classList.remove('swipe-left','swipe-right');
  const dx=e.changedTouches[0].clientX-txStart,dy=e.changedTouches[0].clientY-tyStart;
  if(e.target.closest('#speak-btn')||e.target.closest('#speak-ex-btn'))return;
  if(!tMoved){if(!didInteract)didInteract=true;if(cardState===0){const c=cards[currentIndex];if(c)speak(c.en);}advanceState();}
  else if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){grade(dx>0);}
},{passive:true});
cardEl.addEventListener('click',e=>{
  if(tHandled){tHandled=false;return;}
  if(e.target.closest('#speak-btn')||e.target.closest('#speak-ex-btn'))return;
  if(!didInteract)didInteract=true;
  if(cardState===0){const c=cards[currentIndex];if(c)speak(c.en);}
  advanceState();
});
document.addEventListener('keydown',e=>{
  if(document.getElementById('history-panel').classList.contains('open')){if(e.key==='Escape')closeHistory();return;}
  if(document.getElementById('settings-panel').classList.contains('open')){if(e.key==='Escape')closeSettings();return;}
  if(e.code==='Space'){e.preventDefault();advanceState();}
  if(e.key==='ArrowRight')grade(true);
  if(e.key==='ArrowLeft')grade(false);
});

// ── BOOT ──
(async()=>{
  const synced=await syncLoad();
  const prog=JSON.parse(localStorage.getItem('lex_exam_progress')||'null');
  if(prog&&prog.cardKeys&&prog.currentIndex<prog.cardKeys.length){
    const phraseMap=Object.fromEntries(PHRASES.map(p=>[p.en,p]));
    const restored=prog.cardKeys.map(k=>phraseMap[k]).filter(Boolean);
    if(restored.length>0){
      currentMode=prog.mode||'flash';
      currentCatFilter=prog.cat||'all';
      currentLvFilter=prog.lv||'all';
      document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['flash','review'][i]===currentMode));
      cards=restored;currentIndex=prog.currentIndex;cardState=prog.cardState||0;
      scoreKnow=prog.scoreKnow||0;scoreUnknown=prog.scoreUnknown||0;scoreMaster=prog.scoreMaster||0;
      Object.keys(wordStats).forEach(k=>{wordStats[k].firstAttemptInSession=false;});
      document.getElementById('complete-screen').classList.remove('visible');
      document.getElementById('card-wrap').classList.remove('hidden');
      document.getElementById('action-row').classList.remove('hidden');
      updateUI();renderCard();
      if(synced)console.log('Cloud sync OK');
      return;
    }
  }
  initDeck();
  if(synced)console.log('Cloud sync OK');
})();
</script>
