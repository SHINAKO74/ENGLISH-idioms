<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LEXICON — 英熟語 受験</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0d0b;--card:#1a1814;--gold:#c9a84c;--gold-dim:#7a6230;--cream:#f5f0e8;--sage:#7aaa7a;--red:#c96450;--muted:#5a5650}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
header{width:100%;padding:14px 20px 11px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(201,168,76,0.15);position:relative;z-index:10;flex-wrap:wrap}
.logo{font-family:'IM Fell English SC',serif;font-size:20px;letter-spacing:0.2em;color:var(--gold)}
.logo-sub{font-size:10px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase;margin-top:2px}
.header-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.filter-select{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.06em;padding:6px 10px;border-radius:2px;cursor:pointer;transition:all 0.15s;outline:none}
.filter-select option{background:#1a1814;color:var(--cream)}
.filter-select:focus{border-color:rgba(201,168,76,0.4);color:var(--cream)}
.mode-tabs{display:flex;border:1px solid rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.mode-tab{background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;padding:7px 12px;cursor:pointer;transition:all 0.15s;border-right:1px solid rgba(255,255,255,0.07)}
.mode-tab:last-child{border-right:none}
.mode-tab.active{background:rgba(201,168,76,0.12);color:var(--gold)}
.history-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;padding:7px 12px;border-radius:2px;cursor:pointer;transition:all 0.15s}
.history-btn:hover{color:var(--cream);border-color:rgba(255,255,255,0.25)}
.progress-section{width:100%;max-width:680px;padding:14px 20px 0;position:relative;z-index:1}
.progress-meta{display:flex;justify-content:space-between;font-size:13px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.progress-track{height:2px;background:rgba(255,255,255,0.06);border-radius:1px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:1px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1);position:relative}
.progress-dot{position:absolute;right:-3px;top:-3px;width:8px;height:8px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold)}
.score-pills{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.pill{font-size:13px;letter-spacing:0.07em;padding:4px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill-know{background:rgba(122,170,122,0.12);color:var(--sage);border:1px solid rgba(122,170,122,0.2)}
.pill-unknown{background:rgba(201,100,80,0.1);color:var(--red);border:1px solid rgba(201,100,80,0.2)}
.pill-master{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px 16px;width:100%;position:relative;z-index:1}
.card-wrap{width:580px;max-width:100%;margin-bottom:24px;position:relative;touch-action:pan-y;user-select:none;-webkit-user-select:none}
.card{width:100%;min-height:310px;background:var(--card);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:34px 38px;box-shadow:0 18px 48px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04);position:relative;cursor:pointer;transition:background 0.1s,box-shadow 0.1s,transform 0.1s}
.card::before,.card::after{content:'';position:absolute;width:20px;height:20px}
.card::before{top:12px;left:12px;border-top:1.5px solid var(--gold-dim);border-left:1.5px solid var(--gold-dim)}
.card::after{bottom:12px;right:12px;border-bottom:1.5px solid var(--gold-dim);border-right:1.5px solid var(--gold-dim)}
.card.swipe-left{background:#2a1410;box-shadow:0 18px 48px rgba(0,0,0,0.55),-4px 0 24px rgba(201,100,80,0.25),0 0 0 1px rgba(201,100,80,0.2);transform:rotate(-3deg) translateX(-8px)}
.card.swipe-right{background:#10221a;box-shadow:0 18px 48px rgba(0,0,0,0.55),4px 0 24px rgba(122,170,122,0.25),0 0 0 1px rgba(122,170,122,0.2);transform:rotate(3deg) translateX(8px)}
.swipe-label{position:absolute;top:16px;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600;opacity:0;transition:opacity 0.1s;pointer-events:none;padding:4px 10px;border-radius:2px}
.swipe-label-left{left:14px;color:var(--red);border:1px solid rgba(201,100,80,0.4);background:rgba(201,100,80,0.1)}
.swipe-label-right{right:14px;color:var(--sage);border:1px solid rgba(122,170,122,0.4);background:rgba(122,170,122,0.1)}
.card.swipe-left .swipe-label-left{opacity:1}
.card.swipe-right .swipe-label-right{opacity:1}
.card-number{position:absolute;top:12px;right:16px;font-size:12px;letter-spacing:0.2em;opacity:0.3}
.status-badge{position:absolute;top:12px;left:14px;font-size:11px;letter-spacing:0.13em;padding:3px 8px;border-radius:2px;opacity:0.85;transition:opacity 0.3s;text-transform:uppercase;border:1px solid transparent}
.status-badge.st-master{color:var(--gold);border-color:rgba(201,168,76,0.35);background:rgba(201,168,76,0.1)}
.status-badge.st-know{color:var(--sage);border-color:rgba(122,170,122,0.3);background:rgba(122,170,122,0.08)}
.status-badge.st-unknown{color:var(--red);border-color:rgba(201,100,80,0.3);background:rgba(201,100,80,0.08)}
.status-badge.st-new{color:var(--muted);border-color:rgba(255,255,255,0.08);background:rgba(255,255,255,0.03)}
.state-dots{display:flex;gap:6px;position:absolute;bottom:13px;left:50%;transform:translateX(-50%)}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background 0.2s}
.dot.active{background:var(--gold)}
.card-content{width:100%;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadeSlideIn 0.22s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* State 0 */
.s-header-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap}
.s-cat{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;opacity:0.35;border:1px solid rgba(255,255,255,0.08);padding:3px 9px;border-radius:20px}
.s-level{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.s-level.lv-basic{color:var(--sage);border:1px solid rgba(122,170,122,0.3);background:rgba(122,170,122,0.08)}
.s-level.lv-standard{color:var(--gold);border:1px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.08)}
.s-level.lv-advanced{color:var(--red);border:1px solid rgba(201,100,80,0.3);background:rgba(201,100,80,0.08)}
.s-phrase{font-family:'Playfair Display',serif;font-size:clamp(19px,4.2vw,32px);font-weight:700;line-height:1.4;color:var(--cream);margin-bottom:12px;max-width:460px}
.speak-btn{background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:10px 26px;font-size:22px;cursor:pointer;color:var(--cream);opacity:0.45;transition:opacity 0.15s;margin-top:4px}
.speak-btn:hover{opacity:0.75}
.speak-btn:active{opacity:1}
.hint-text{position:absolute;bottom:34px;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;opacity:0.18}

/* State 1 */
.s-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--sage);opacity:0.6;margin-bottom:12px}
.s-ja{font-size:clamp(28px,5.5vw,44px);font-weight:300;color:var(--cream);margin-bottom:6px;line-height:1.3}
.s-pos{font-size:14px;color:var(--sage);opacity:0.55;font-style:italic}

/* State 2 */
.s-ex-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--gold);opacity:0.55;margin-bottom:14px}
.s-ex-en{font-family:'Playfair Display',serif;font-style:italic;color:var(--cream);opacity:0.82;line-height:1.75;margin-bottom:11px;max-width:460px}
.s-ex-ja{font-size:15px;color:var(--cream);opacity:0.36;line-height:1.65}

/* State 3 — 試験ポイント */
.s-tip-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--sage);margin-bottom:9px}
.s-tip-content{font-size:15px;color:var(--cream);opacity:0.82;line-height:1.75;text-align:center;margin-bottom:10px;max-width:450px}
.s-tip-divider{width:32px;height:1px;background:rgba(201,168,76,0.2);margin:3px auto 11px}
.s-sim-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.s-sim-content{font-size:14px;color:var(--cream);opacity:0.5;line-height:1.8;text-align:center;max-width:450px;margin-bottom:10px}
.s-cau-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--red);opacity:0.8;margin-bottom:7px}
.s-cau-content{font-size:14px;color:var(--cream);opacity:0.5;line-height:1.8;text-align:center;max-width:450px}

/* Actions */
.action-row{display:flex;gap:12px}
.btn{font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:0.14em;text-transform:uppercase;padding:14px 28px;border:none;border-radius:2px;cursor:pointer;transition:all 0.18s;font-weight:500}
.btn-unknown{background:rgba(201,100,80,0.1);color:var(--red);border:1px solid rgba(201,100,80,0.3)}
.btn-unknown:active{background:rgba(201,100,80,0.25)}
.btn-know{background:rgba(122,170,122,0.12);color:var(--sage);border:1px solid rgba(122,170,122,0.3)}
.btn-know:active{background:rgba(122,170,122,0.28)}
.btn-skip{background:transparent;color:var(--muted);border:1px solid rgba(255,255,255,0.07);padding:14px 15px}
.swipe-hints{display:none;justify-content:space-between;width:100%;margin-top:12px;font-size:13px;letter-spacing:0.07em;color:var(--muted);opacity:0.4;padding:0 4px}
.key-hints{margin-top:15px;display:flex;gap:16px;opacity:0.27;font-size:11px;letter-spacing:0.08em}
.key-hint{display:flex;align-items:center;gap:5px}
.key{border:1px solid currentColor;border-radius:3px;padding:2px 6px;font-size:10px}

/* Complete */
.complete-screen{display:none;flex-direction:column;align-items:center;text-align:center;animation:fadeIn 0.5s ease}
.complete-screen.visible{display:flex}
.card-wrap.hidden,.action-row.hidden{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.complete-title{font-family:'IM Fell English SC',serif;font-size:38px;color:var(--gold);margin-bottom:8px;letter-spacing:0.05em}
.complete-sub{color:var(--muted);font-size:12px;letter-spacing:0.12em;margin-bottom:32px}
.complete-stats{display:flex;gap:30px;margin-bottom:36px}
.stat{display:flex;flex-direction:column;align-items:center;gap:6px}
.stat-num{font-family:'Playfair Display',serif;font-size:44px;font-weight:700;line-height:1}
.stat-know .stat-num{color:var(--sage)}.stat-unknown .stat-num{color:var(--red)}.stat-master .stat-num{color:var(--gold)}
.stat-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted)}
.btn-restart{background:transparent;color:var(--gold);border:1px solid var(--gold-dim);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;padding:13px 36px;border-radius:2px;cursor:pointer;transition:all 0.18s}
.btn-restart:hover{background:rgba(201,168,76,0.08);border-color:var(--gold)}

/* History panel */
.history-panel{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);justify-content:flex-end}
.history-panel.open{display:flex;animation:fadeIn 0.2s ease}
.history-drawer{width:min(500px,100vw);height:100%;background:#131210;border-left:1px solid rgba(201,168,76,0.12);display:flex;flex-direction:column;animation:slideInR 0.25s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideInR{from{transform:translateX(100%)}to{transform:none}}
.history-header{padding:18px 18px 12px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;gap:10px}
.history-title{font-family:'IM Fell English SC',serif;font-size:18px;color:var(--gold);letter-spacing:0.1em}
.history-header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.copy-btn{background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.1em;padding:5px 12px;border-radius:2px;cursor:pointer;transition:all 0.15s}
.copy-btn:hover{color:var(--cream);border-color:rgba(255,255,255,0.3)}
.copy-btn.copied{color:var(--sage);border-color:rgba(122,170,122,0.4)}
.history-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1;transition:color 0.15s}
.history-close:hover{color:var(--cream)}
.history-filters{padding:10px 14px;display:flex;gap:7px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.04)}
.hfilter-btn{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;padding:4px 11px;border-radius:20px;cursor:pointer;transition:all 0.15s}
.hfilter-btn.active{border-color:var(--gold-dim);color:var(--gold);background:rgba(201,168,76,0.08)}
.history-list{flex:1;overflow-y:auto;padding:4px 0}
.history-list::-webkit-scrollbar{width:4px}
.history-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.history-item{display:flex;align-items:center;padding:10px 18px;gap:11px;border-bottom:1px solid rgba(255,255,255,0.03)}
.h-badge{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.h-badge.know{background:rgba(122,170,122,0.15);color:var(--sage);border:1px solid rgba(122,170,122,0.2)}
.h-badge.unknown{background:rgba(201,100,80,0.12);color:var(--red);border:1px solid rgba(201,100,80,0.2)}
.h-badge.master{background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.2)}
.h-badge.new{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid rgba(255,255,255,0.1)}
.h-phrase{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;font-weight:700;color:var(--cream);line-height:1.4}
.h-ja{font-size:11px;color:var(--muted);margin-top:2px}
.h-fail{margin-left:auto;font-size:11px;white-space:nowrap;color:var(--red);opacity:0.7;flex-shrink:0}
.h-fail.zero{color:var(--muted);opacity:0.3}
.history-empty{padding:56px 18px;text-align:center;color:var(--muted);font-size:13px;letter-spacing:0.1em}
.history-count{padding:7px 18px 5px;font-size:11px;color:var(--muted);letter-spacing:0.08em;opacity:0.6}
.sort-btn{font-size:10px;padding:4px 9px;border-radius:2px}
.sort-btn.active{color:var(--gold);border-color:var(--gold-dim);background:rgba(201,168,76,0.08)}

@media(max-width:580px){
  header{padding:11px 12px;gap:6px}.logo{font-size:17px}
  .header-right{gap:5px}.mode-tab{padding:6px 8px;font-size:10px}.history-btn{font-size:10px;padding:6px 9px}
  .filter-select{font-size:10px;padding:5px 7px}
  .progress-section{padding:11px 12px 0}
  main{padding:14px 11px 12px}
  .card{min-height:280px;padding:26px 20px}
  .action-row{width:100%;gap:8px}.btn{flex:1;padding:14px 6px;font-size:11px;letter-spacing:0.06em}.btn-skip{flex:0 0 auto;padding:14px 11px}
  .key-hints{display:none}.swipe-hints{display:flex}
}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">Lexicon</div>
    <div class="logo-sub">英熟語 受験</div>
  </div>
  <div class="header-right">
    <select class="filter-select" id="cat-filter" onchange="setCatFilter(this.value)">
      <option value="all">カテゴリ：すべて</option>
      <option value="verb">動詞句</option>
      <option value="prep">前置詞句</option>
      <option value="adj">形容詞構文</option>
      <option value="conj">接続詞的</option>
      <option value="adv">副詞句</option>
    </select>
    <select class="filter-select" id="lv-filter" onchange="setLvFilter(this.value)">
      <option value="all">レベル：すべて</option>
      <option value="basic">共通テスト</option>
      <option value="standard">標準</option>
      <option value="advanced">発展</option>
    </select>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('flash')">通常</button>
      <button class="mode-tab" onclick="setMode('review')">復習のみ</button>
    </div>
    <button class="history-btn" onclick="openStatus()">状況</button>
    <button class="history-btn" onclick="openSettings()">設定</button>
  </div>
</header>
<div class="progress-section">
  <div class="progress-meta"><span id="progress-label">0 / 0</span><span id="progress-pct">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"><div class="progress-dot"></div></div></div>
  <div class="score-pills">
    <div class="pill pill-know"><div class="pill-dot"></div>正解: <span id="score-know">0</span></div>
    <div class="pill pill-unknown"><div class="pill-dot"></div>要復習: <span id="score-unknown">0</span></div>
    <div class="pill pill-master"><div class="pill-dot"></div>習得: <span id="score-master">0</span></div>
  </div>
</div>
<main>
  <div class="card-wrap" id="card-wrap">
    <div class="card" id="card">
      <div class="swipe-label swipe-label-left">✕ 要復習</div>
      <div class="swipe-label swipe-label-right">○ 正解</div>
      <div class="status-badge st-new" id="status-badge">NEW</div>
      <div class="card-number" id="card-num"></div>
      <div class="card-content" id="card-content"></div>
      <div class="state-dots" id="state-dots"></div>
    </div>
  </div>
  <div class="action-row" id="action-row">
    <button class="btn btn-unknown" onclick="grade(false)">✕ 要復習</button>
    <button class="btn btn-skip" onclick="nextCard()">→</button>
    <button class="btn btn-know" onclick="grade(true)">○ 正解</button>
  </div>
  <div class="key-hints">
    <div class="key-hint"><span class="key">Space</span>次へ</div>
    <div class="key-hint"><span class="key">←</span>要復習</div>
    <div class="key-hint"><span class="key">→</span>正解</div>
  </div>
  <div class="swipe-hints"><span>← 要復習</span><span>タップで次へ</span><span>正解 →</span></div>
  <div class="complete-screen" id="complete-screen">
    <div class="complete-title">Complete</div>
    <div class="complete-sub">セッション終了</div>
    <div class="complete-stats">
      <div class="stat stat-know"><div class="stat-num" id="final-know">0</div><div class="stat-label">正解</div></div>
      <div class="stat stat-unknown"><div class="stat-num" id="final-unknown">0</div><div class="stat-label">要復習</div></div>
      <div class="stat stat-master"><div class="stat-num" id="final-master">0</div><div class="stat-label">習得</div></div>
    </div>
    <button class="btn-restart" onclick="restart()">もう一度</button>
  </div>
</main>
<div class="history-panel" id="history-panel" onclick="handlePanelBg(event)">
  <div class="history-drawer" style="width:min(540px,100vw)">
    <div class="history-header">
      <div class="history-title">Status</div>
      <div class="history-header-right">
        <button class="copy-btn" onclick="exportStatus()" style="border-color:rgba(201,168,76,0.3);color:var(--gold)">エクスポート</button>
        <button class="history-close" onclick="closeHistory()">✕</button>
      </div>
    </div>
    <div class="history-filters">
      <button class="hfilter-btn active" onclick="setStatusFilter('all',this)">すべて</button>
      <button class="hfilter-btn" onclick="setStatusFilter('master',this)">★ 習得済み</button>
      <button class="hfilter-btn" onclick="setStatusFilter('know',this)">○ 前回正解</button>
      <button class="hfilter-btn" onclick="setStatusFilter('unknown',this)">✕ 要復習</button>
      <button class="hfilter-btn" onclick="setStatusFilter('new',this)">NEW 未着手</button>
    </div>
    <div style="padding:8px 16px 4px;display:flex;gap:10px;align-items:center;border-bottom:1px solid rgba(255,255,255,0.04)">
      <div style="font-size:11px;color:var(--muted);letter-spacing:0.08em" id="status-count"></div>
      <div style="margin-left:auto;display:flex;gap:6px">
        <button class="copy-btn sort-btn active" id="sort-fail" onclick="setStatusSort('fail',this)">苦手順</button>
        <button class="copy-btn sort-btn" id="sort-az" onclick="setStatusSort('az',this)">A→Z</button>
        <button class="copy-btn sort-btn" id="sort-level" onclick="setStatusSort('level',this)">レベル順</button>
      </div>
    </div>
    <div class="history-list" id="status-list"></div>
  </div>
</div>

<!-- Settings Panel -->
<div class="history-panel" id="settings-panel" onclick="handleSettingsBg(event)">
  <div class="history-drawer" style="width:min(360px,100vw)">
    <div class="history-header">
      <div class="history-title">Settings</div>
      <div class="history-header-right">
        <button class="history-close" onclick="closeSettings()">✕</button>
      </div>
    </div>
    <div style="padding:24px;display:flex;flex-direction:column;gap:26px;overflow-y:auto;flex:1">

      <div>
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">1セッションの語数</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--muted)">少</span>
          <input type="range" id="session-slider" min="10" max="871" step="10" value="50"
            style="flex:1;accent-color:var(--gold);height:4px;cursor:pointer"
            oninput="setSessionSize(this.value)">
          <span style="font-size:12px;color:var(--muted)">全</span>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px" id="session-label">50語</div>
        <button onclick="applySessionSize()" style="margin-top:12px;width:100%;background:rgba(201,168,76,0.1);border:1px solid var(--gold-dim);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.1em;padding:10px;border-radius:2px;cursor:pointer">このセッションに適用</button>
      </div>

      <div>
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">音量</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:16px;opacity:0.5">🔇</span>
          <input type="range" id="vol-slider" min="0" max="1" step="0.05" value="1"
            style="flex:1;accent-color:var(--gold);height:4px;cursor:pointer"
            oninput="setVolume(this.value)">
          <span style="font-size:16px;opacity:0.5">🔊</span>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px" id="vol-label">100%</div>
      </div>

      <div>
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">読み上げ速度</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-size:12px;color:var(--muted)">遅</span>
          <input type="range" id="rate-slider" min="0.5" max="1.5" step="0.05" value="0.85"
            style="flex:1;accent-color:var(--gold);height:4px;cursor:pointer"
            oninput="setRate(this.value)">
          <span style="font-size:12px;color:var(--muted)">速</span>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px" id="rate-label">0.85×</div>
      </div>

      <div>
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">サウンドエフェクト</div>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="se-toggle" checked
            style="width:16px;height:16px;accent-color:var(--gold);cursor:pointer"
            onchange="setSeEnabled(this.checked)">
          <span style="font-size:13px;color:var(--cream)">SE（正解・不正解・習得）を鳴らす</span>
        </label>
      </div>

      <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:22px">
        <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px">データ</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button onclick="resetProgress()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;padding:10px;border-radius:2px;cursor:pointer;text-align:left">進行状態をリセット</button>
          <button onclick="resetAll()" style="background:transparent;border:1px solid rgba(201,100,80,0.3);color:var(--red);font-family:'DM Sans',sans-serif;font-size:12px;padding:10px;border-radius:2px;cursor:pointer;text-align:left">全データをリセット</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// ── 試験ポイント ──
const POINT = {
// BASIC
"take advantage of":{tip:"advantage は可算名詞。「うまく利用する」の積極的ニュアンス",similar:"make use of / utilize / avail oneself of",caution:"× take advantage for は誤り。前置詞は必ず of"},
"make use of":{tip:"make good use of（うまく活用）/ make full use of（十分に活用）の形が頻出",similar:"take advantage of / utilize / employ / draw on",caution:"use は名詞。× make use from は誤り"},
"in spite of":{tip:"後ろは名詞・動名詞のみ。despite と書き換え可能な超頻出問題",similar:"despite / notwithstanding / regardless of",caution:"× in spite of that は不可 → although / though に換える"},
"thanks to":{tip:"肯定的な原因に使うのが基本。皮肉で否定的文脈にも使える",similar:"owing to / due to / because of / on account of",caution:"due to は形式ばった書き言葉向き。thanks to は口語でも自然"},
"due to":{tip:"due to（前置詞句）と be due to（〜するはずだ）の区別は必須",similar:"owing to / because of / on account of / as a result of",caution:"文頭での due to を厳格な文語では避ける場合があるが入試では許容"},
"because of":{tip:"because は接続詞（SV）、because of は前置詞句（名詞）の区別が超頻出",similar:"due to / owing to / on account of",caution:"× because of that は不可 → because（接続詞）に換える"},
"as a result of":{tip:"as a result（単独）で「その結果」。of + 名詞で原因を明示",similar:"owing to / due to / in consequence of / as a consequence of",caution:"result in（原因→結果）/ result from（結果←原因）との区別も必須"},
"according to":{tip:"出典・情報源を示す。自分の意見には絶対使えない",similar:"based on / in line with / as stated in",caution:"× according to me / my opinion は誤り。in my opinion を使う"},
"instead of":{tip:"instead of -ing（〜する代わりに）の形で頻出",similar:"in place of / in lieu of / rather than",caution:"後ろは名詞・動名詞（× instead of + 原形）"},
"in addition to":{tip:"besides と書き換え可能。in addition（単独）も「さらに」で重要",similar:"besides / apart from / on top of / as well as",caution:"addition のつづり注意。in addition to -ing の動名詞形も頻出"},
"compared with":{tip:"compared to は比喩的比較、compared with は客観的対比",similar:"in comparison with / relative to / compared to",caution:"分詞構文として Compared with last year, ... と文頭でも使える"},
"regardless of":{tip:"irrespective of と同義。No matter what でも書き換え可",similar:"irrespective of / no matter what / in spite of",caution:"× irregardless は誤り（非標準）。regardless に統一する"},
"in order to":{tip:"目的を表す最頻出表現。否定は in order not to",similar:"so as to / to（不定詞目的）/ for the purpose of / with a view to",caution:"主語が主節と異なるとき in order for A to do の形を使う"},
"so as to":{tip:"in order to と書き換え可能。否定形 so as not to は頻出",similar:"in order to / to（不定詞）/ with the aim of",caution:"意味上の主語は主節の主語と同じでなければならない"},
"as long as":{tip:"①「〜する限り」（条件）②「〜の間ずっと」（時間）の2意味",similar:"so long as / provided that / on condition that",caution:"as far as は「範囲・程度」、as long as は「条件・時間的継続」。混同注意"},
"as soon as":{tip:"「〜するとすぐに」。no sooner ... than への書き換えが超頻出",similar:"the moment / immediately after / no sooner ... than",caution:"時・条件節なので未来の内容も現在形（× as soon as it will rain）"},
"as well as":{tip:"「〜と同様に・〜に加えて」。A as well as B では動詞はAに一致",similar:"in addition to / besides / not only ... but also",caution:"John as well as his friends was invited.（動詞はJohnに合わせ単数）"},
"had better":{tip:"「〜した方がよい」（義務・警告）。否定は had better not + 原形",similar:"should / ought to / would be well-advised to",caution:"× had better to は誤り。had better + 原形（to なし）"},
"used to do":{tip:"「以前は〜していた（今は違う）」。be used to -ing との混同は最頻出",similar:"would（過去の習慣：ただし状態動詞には使えない）",caution:"used to + 原形。be used to は「慣れている」でまったく別の意味"},
"be used to -ing":{tip:"「〜に慣れている（状態）」。to は前置詞なので後ろは動名詞",similar:"be accustomed to -ing / be familiar with",caution:"× be used to do は誤り。to の後は必ず名詞か動名詞"},
"get used to -ing":{tip:"「〜に慣れる（変化の過程）」。be used to（状態）との対比",similar:"become accustomed to / adapt to / adjust to",caution:"to は前置詞。後ろは名詞・動名詞のみ"},
"be likely to":{tip:"「〜しそうだ」。It is likely that SV と書き換え可能",similar:"It is likely that / be expected to / be apt to",caution:"be likely + 形容詞ではなく be likely to + 動詞の形"},
"be supposed to":{tip:"「〜することになっている」。was supposed to（するはずだったが実際はしなかった）は重要",similar:"be expected to / be meant to / be scheduled to",caution:"過去形 was supposed to は「予定・期待に反して実際はしなかった」の意味を含む"},
"on the whole":{tip:"「概して・全体的に見て」。generally speaking と書き換え可能",similar:"in general / generally / for the most part / by and large",caution:"as a whole（まとまりとして）との意味の違いに注意"},
"in general":{tip:"「一般的に」。文頭・文末・文中どこでも使える汎用性の高い副詞句",similar:"generally / on the whole / in most cases / typically",caution:"in general terms（一般的な言い方で）という用法もある"},
"for example":{tip:"例示の定番表現。for instance と書き換え可能",similar:"for instance / such as / to illustrate / e.g.",caution:"for example は文修飾、such as は名詞修飾の違いを区別する"},
"in other words":{tip:"「言い換えると」。that is (to say) と同義",similar:"that is (to say) / namely / to put it another way / in short",caution:"前の内容を否定するのではなく、言い換え・補足に使う"},
"on the contrary":{tip:"「それどころか」。前述の否定への反論。in contrast（単純対比）とは異なる",similar:"rather / instead / quite the opposite",caution:"in contrast（対照的に）は単純対比。on the contrary は「否定の逆転」"},
"on the other hand":{tip:"「他方・一方では」。on the one hand と対応させるのが理想的",similar:"whereas / while / conversely / by contrast",caution:"on the one hand（一方では）と対応させるとより自然な文章になる"},
"in fact":{tip:"「実際には」「それどころか」。前の内容を強調・修正・具体化する",similar:"as a matter of fact / in reality / actually / indeed",caution:"「期待に反して実は〜」という文脈でもよく使われる"},
"not only A but also B":{tip:"「AだけでなくBも」。強調倒置：Not only が文頭に来たら倒置必須",similar:"A as well as B / B in addition to A / both A and B",caution:"Not only did he fail, but he also lied.（倒置形）は超頻出"},
"either A or B":{tip:"「AかBか」。動詞はBに一致。neither A nor B とセットで覚える",similar:"A or B（either はオプション強調）",caution:"neither A nor B（どちらも〜ない）との混同注意"},
"neither A nor B":{tip:"「AもBも〜ない」。動詞はBに一致。Neither が文頭なら倒置",similar:"not A or B / not either of A or B",caution:"neither の後の動詞は肯定形（× neither A nor B don't）"},
"result in":{tip:"「〜という結果になる（原因→結果）」。result from の逆方向",similar:"lead to / give rise to / bring about / cause",caution:"result in（原因→結果）vs result from（結果←原因）を図で覚える"},
"result from":{tip:"「〜から生じる（結果←原因）」。result in の逆方向",similar:"arise from / stem from / originate from / be caused by",caution:"The accident resulted from carelessness.（結果←原因）"},
"lead to":{tip:"「〜につながる・〜を引き起こす」。主語が原因、to の後が結果",similar:"result in / give rise to / contribute to / bring about",caution:"lead to + 名詞・動名詞（× lead to + 原形）"},
"depend on":{tip:"「〜に依存する」「〜によって異なる」の2意味",similar:"rely on / count on / hinge on / rest on",caution:"It depends on whether...（〜かどうかによる）の形も頻出"},
"consist of":{tip:"「〜から成り立つ」（状態動詞）。進行形・受動態にしない",similar:"be composed of / be made up of / comprise",caution:"× be consisted of は誤り。consist of に受動態はない"},
"be aware of":{tip:"「〜に気づいている（状態）」。become aware of（変化）との区別",similar:"be conscious of / realize / know / recognize",caution:"be aware that SV（〜ということを知っている）の that 節形も頻出"},
"far from":{tip:"far from + 名詞/形容詞/動名詞「〜どころか」。強い否定の強調",similar:"anything but / by no means / not at all",caution:"far from -ing（〜するどころか）は入試頻出"},
"look up to":{tip:"「〜を尊敬する」。look down on（見下す）と対で覚える",similar:"respect / admire / think highly of / hold in high regard",caution:"look up to vs look down on を対で整理する"},
"look down on":{tip:"「〜を見下す・軽蔑する」。look up to（尊敬する）と対",similar:"despise / condescend / belittle / have contempt for",caution:"look up to の対義語として一緒に整理する"},
"put off":{tip:"「〜を延期する」「〜をいやがらせる」の2意味。postpone と書き換え可",similar:"postpone / delay / defer（延期）/ discourage / deter（いやがらせる）",caution:"put off -ing（〜することを延期する）の動名詞形が頻出"},
"put on":{tip:"「〜を着る・身につける」「〜を上演する」「〜をだます」の多義語",similar:"wear（着用状態）/ perform / stage（上演）/ fool / deceive（だます）",caution:"put on（着る動作）vs wear（着ている状態）の区別は必須"},
"put up with":{tip:"「〜を我慢する」。tolerate / endure と書き換え可",similar:"tolerate / endure / bear / stand / stomach",caution:"put up with + 名詞・動名詞。× put up with + 原形は不可"},
"come across":{tip:"「〜に偶然出会う」「〜という印象を与える」の2意味",similar:"happen to find / run across / stumble upon（偶然出会う）",caution:"2つの意味を文脈で区別する。She came across as confident.（印象を与える）"},
"come up with":{tip:"「〜を思いつく・考え出す」。アイデアが浮かび上がるイメージ",similar:"think of / devise / hit upon / dream up",caution:"come up with + 名詞（× come up with + that 節）"},
"come to":{tip:"「〜になる・〜に達する」「意識を取り戻す」の2意味",similar:"amount to / reach / total（合計になる）/ regain consciousness（意識を取り戻す）",caution:"come to + 名詞（金額・量）の形が頻出。come to one's senses も重要"},
"go through":{tip:"「〜を経験する」「〜を精査する」「〜を消費する」の多義語",similar:"undergo / experience（経験）/ examine / review（精査）/ consume（消費）",caution:"複数の意味を文脈から判断する"},
"turn out":{tip:"「〜という結果になる・〜だとわかる」",similar:"prove to be / appear to be / come out / end up",caution:"turn out to be + 形容詞/名詞の形が最頻出。It turned out that ... も重要"},
"turn down":{tip:"「〜を断る」「音量を下げる」の2意味",similar:"reject / decline / refuse（断る）/ lower / reduce（下げる）",caution:"turn down an offer（申し出を断る）が最頻出"},
"take part in":{tip:"「〜に参加する」。participate in と書き換え可",similar:"participate in / join in / be involved in / take a part in",caution:"× take part of は誤り。前置詞は必ず in"},
"take place":{tip:"「起こる・行われる」。happen / occur と書き換え可。受動態にしない",similar:"happen / occur / come about / be held",caution:"× be taken place は誤り。take place に受動態はない"},
"make up":{tip:"「〜を構成する」「〜をでっち上げる」「仲直りする」「化粧する」の多義語",similar:"constitute / compose（構成）/ fabricate / invent（でっち上げ）/ reconcile（仲直り）",caution:"be made up of（受動態形）は「〜から構成されている」"},
"make out":{tip:"「〜を理解する」「〜を見分ける」「うまくやる」の多義語",similar:"understand / discern（理解・見分け）/ manage / fare（うまくやる）",caution:"Can you make out what he's saying?（聞き取れますか？）が典型"},
"give up":{tip:"「あきらめる・やめる」。abandon / stop と書き換え可",similar:"abandon / quit / stop / cease / renounce",caution:"give up -ing（〜することをやめる）の動名詞形に注意"},
"give in":{tip:"「屈する・負ける」「提出する」の2意味。submit と書き換え可（提出）",similar:"yield / surrender / submit / hand in（提出）",caution:"give in to pressure（圧力に屈する）が典型パターン"},
"stand for":{tip:"「〜を表す・象徴する」「〜を我慢する」の2意味",similar:"represent / symbolize（表す）/ tolerate / put up with（我慢する）",caution:"What does this acronym stand for?（何の略？）が頻出パターン"},
"stand out":{tip:"「目立つ・際立つ」。be conspicuous と書き換え可",similar:"be conspicuous / be prominent / be noticeable / stick out",caution:"stand out as（〜として際立つ）/ stand out from（〜の中で目立つ）の形も重要"},
"look for":{tip:"「〜を探している（進行中）」。search for と書き換え可",similar:"search for / seek / hunt for / be in search of",caution:"look for（探している過程）vs find（見つけた結果）の区別"},
"look after":{tip:"「〜の世話をする」。take care of と書き換え可",similar:"take care of / care for / tend to / attend to",caution:"look after のあとは名詞・代名詞（× look after to do）"},
"look into":{tip:"「〜を調査する」。investigate と書き換え可",similar:"investigate / examine / inquire into / probe into",caution:"look into + 名詞。The police looked into the case.が典型"},
"run out of":{tip:"「〜を使い果たす」。be short of と書き換え可",similar:"use up / exhaust / deplete / be short of",caution:"run out of time / money / patience が最頻出パターン"},
"run into":{tip:"「〜に偶然出会う」「〜に衝突する」の2意味",similar:"come across / bump into / encounter（偶然出会う）/ collide with（衝突）",caution:"run into trouble / problems（困難に遭遇する）の用法も重要"},
"get over":{tip:"「〜を乗り越える」「〜から回復する」の2意味",similar:"recover from / bounce back from（回復）/ overcome / surmount（乗り越える）",caution:"get over a cold（風邪が治る）/ get over a difficulty（困難を乗り越える）"},
"get rid of":{tip:"「〜を取り除く・処分する」。eliminate / remove と書き換え可",similar:"eliminate / remove / dispose of / do away with",caution:"get rid of の後は名詞（× get rid from）"},
"carry out":{tip:"「〜を実行する・実施する」。implement / execute と書き換え可",similar:"execute / implement / perform / accomplish / conduct",caution:"carry out a plan / experiment / research の形が頻出"},
"break out":{tip:"「（戦争・火事・病気などが）勃発する・発生する」",similar:"erupt / start suddenly / flare up / occur suddenly",caution:"break out は主語が「出来事・現象」（War broke out. / Fire broke out.）"},
"break down":{tip:"「故障する」「崩壊する」「〜を分解する」の多義語",similar:"malfunction / stop working（故障）/ collapse（崩壊）/ analyze / classify（分解）",caution:"break down の多義性に注意。文脈で意味を判断する"},

{en:"it goes without saying",ja:"〜は言うまでもない",pos:"動詞句",cat:"verb",level:"standard",exEn:"It goes without saying that hard work is essential.",exJa:"努力が不可欠であることは言うまでもない。"},
{en:"as a whole",ja:"全体として",pos:"副詞句",cat:"adv",level:"standard",exEn:"The society as a whole must address this problem.",exJa:"社会全体としてこの問題に取り組まなければならない。"},
{en:"in a sense",ja:"ある意味では",pos:"副詞句",cat:"adv",level:"standard",exEn:"In a sense, failure is a stepping stone to success.",exJa:"ある意味では、失敗は成功への踏み台だ。"},
{en:"to some extent",ja:"ある程度",pos:"副詞句",cat:"adv",level:"standard",exEn:"The report is accurate to some extent.",exJa:"その報告はある程度正確だ。"},
{en:"to a great extent",ja:"大いに",pos:"副詞句",cat:"adv",level:"standard",exEn:"Technology has, to a great extent, changed our lives.",exJa:"技術は大いに私たちの生活を変えた。"},
{en:"to tell the truth",ja:"実を言うと",pos:"副詞句",cat:"adv",level:"standard",exEn:"To tell the truth, I didn't enjoy the party.",exJa:"実を言うと、そのパーティーは楽しくなかった。"},
{en:"frankly speaking",ja:"率直に言えば",pos:"副詞句",cat:"adv",level:"standard",exEn:"Frankly speaking, I think the plan is too risky.",exJa:"率直に言えば、その計画はリスクが高すぎると思う。"},
{en:"generally speaking",ja:"一般的に言えば",pos:"副詞句",cat:"adv",level:"standard",exEn:"Generally speaking, people prefer comfort to excitement.",exJa:"一般的に言えば、人々は刺激より快適さを好む。"},
{en:"strictly speaking",ja:"厳密に言えば",pos:"副詞句",cat:"adv",level:"standard",exEn:"Strictly speaking, whales are mammals, not fish.",exJa:"厳密に言えば、クジラは魚ではなく哺乳類だ。"},
{en:"so to speak",ja:"いわば",pos:"副詞句",cat:"adv",level:"standard",exEn:"He is, so to speak, a walking encyclopedia.",exJa:"彼はいわば生き字引だ。"},
{en:"in a way",ja:"ある意味では",pos:"副詞句",cat:"adv",level:"standard",exEn:"In a way, I'm glad it happened.",exJa:"ある意味では、それが起きてよかった。"},
{en:"at the same time",ja:"同時に・しかし一方で",pos:"副詞句",cat:"adv",level:"standard",exEn:"He worked two jobs at the same time.",exJa:"彼は同時に2つの仕事をしていた。"},
{en:"in the meantime",ja:"その間に",pos:"副詞句",cat:"adv",level:"standard",exEn:"The results will take a week; in the meantime, rest.",exJa:"結果は1週間かかる。その間に、休んでください。"},
{en:"as a matter of fact",ja:"実のところ",pos:"副詞句",cat:"adv",level:"standard",exEn:"As a matter of fact, I've been there before.",exJa:"実のところ、私は以前そこに行ったことがある。"},
{en:"at any rate",ja:"とにかく",pos:"副詞句",cat:"adv",level:"standard",exEn:"At any rate, we must make a decision today.",exJa:"とにかく、今日決断しなければならない。"},
{en:"in any case",ja:"いずれにしても",pos:"副詞句",cat:"adv",level:"standard",exEn:"In any case, you should call them first.",exJa:"いずれにしても、まず彼らに電話すべきだ。"},
{en:"one after another",ja:"次々と",pos:"副詞句",cat:"adv",level:"standard",exEn:"Problems arose one after another.",exJa:"問題が次々と起きた。"},
{en:"by and large",ja:"概して",pos:"副詞句",cat:"adv",level:"standard",exEn:"By and large, the project went well.",exJa:"概して、そのプロジェクトはうまくいった。"},
{en:"long for",ja:"〜を切望する",pos:"動詞句",cat:"verb",level:"standard",exEn:"She longs for the days when life was simpler.",exJa:"彼女は生活がもっとシンプルだった頃を切望している。"},
{en:"differ from",ja:"〜と異なる",pos:"動詞句",cat:"verb",level:"standard",exEn:"His opinion differs from mine on this issue.",exJa:"この問題では彼の意見は私のものと異なる。"},
{en:"refer to",ja:"〜を参照する・〜を指す",pos:"動詞句",cat:"verb",level:"standard",exEn:"Please refer to the manual for details.",exJa:"詳細はマニュアルを参照してください。"},
{en:"apply to",ja:"〜に当てはまる・〜に適用される",pos:"動詞句",cat:"verb",level:"standard",exEn:"This rule applies to all students.",exJa:"このルールはすべての生徒に当てはまる。"},
{en:"apply for",ja:"〜に申請する・〜に応募する",pos:"動詞句",cat:"verb",level:"standard",exEn:"She applied for the scholarship.",exJa:"彼女はその奨学金に応募した。"},
{en:"consist in",ja:"〜にある・〜に存する",pos:"動詞句",cat:"verb",level:"standard",exEn:"True happiness consists in helping others.",exJa:"真の幸福は他者を助けることにある。"},
{en:"make sense",ja:"意味をなす・理にかなっている",pos:"動詞句",cat:"verb",level:"standard",exEn:"This explanation doesn't make sense.",exJa:"この説明は意味をなさない。"},
{en:"be known for",ja:"〜で知られている",pos:"形容詞構文",cat:"adj",level:"standard",exEn:"Japan is known for its advanced technology.",exJa:"日本は先進技術で知られている。"},
{en:"be known as",ja:"〜として知られている",pos:"形容詞構文",cat:"adj",level:"standard",exEn:"Einstein is known as the father of modern physics.",exJa:"アインシュタインは現代物理学の父として知られている。"},
{en:"be related to",ja:"〜に関連している",pos:"形容詞構文",cat:"adj",level:"standard",exEn:"Stress is closely related to many diseases.",exJa:"ストレスは多くの病気と密接に関連している。"},
{en:"tend to",ja:"〜する傾向がある",pos:"動詞句",cat:"verb",level:"standard",exEn:"Prices tend to rise in summer.",exJa:"夏には物価が上昇する傾向がある。"},
{en:"as far as ... is concerned",ja:"〜に関しては",pos:"接続詞的",cat:"conj",level:"standard",exEn:"As far as I am concerned, the meeting was a success.",exJa:"私に関しては、会議は成功だった。"},
{en:"when it comes to",ja:"〜に関しては",pos:"接続詞的",cat:"conj",level:"standard",exEn:"When it comes to cooking, she is an expert.",exJa:"料理に関しては、彼女は専門家だ。"},
{en:"to say nothing of",ja:"〜は言うまでもなく",pos:"副詞句",cat:"adv",level:"standard",exEn:"He can speak Spanish, to say nothing of English.",exJa:"英語は言うまでもなく、彼はスペイン語も話せる。"},
{en:"in spite of oneself",ja:"思わず・知らず知らずのうちに",pos:"副詞句",cat:"adv",level:"standard",exEn:"She laughed in spite of herself.",exJa:"彼女は思わず笑ってしまった。"},
// ─ 発展 ─
{en:"in view of",ja:"〜を考慮して",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"In view of the circumstances, we postponed the plan.",exJa:"状況を考慮して、計画を延期した。"},
{en:"in the wake of",ja:"〜の後に・〜を受けて",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"In the wake of the financial crisis, new regulations were introduced.",exJa:"金融危機を受けて、新たな規制が導入された。"},
{en:"on the grounds that",ja:"〜という理由で",pos:"接続詞的",cat:"conj",level:"advanced",exEn:"The application was rejected on the grounds that it was incomplete.",exJa:"申請は不完全であるという理由で却下された。"},
{en:"to the extent that",ja:"〜の程度まで",pos:"接続詞的",cat:"conj",level:"advanced",exEn:"Technology has changed our lives to the extent that we can't imagine living without it.",exJa:"技術は私たちの生活をそれなしでは生きられないほど変えた。"},
{en:"in light of",ja:"〜を考慮して",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"In light of recent findings, the policy was revised.",exJa:"最近の調査結果を考慮して、政策が改訂された。"},
{en:"be at a loss",ja:"途方に暮れている",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"I was at a loss for what to say in that situation.",exJa:"その状況で何を言えばよいか途方に暮れた。"},
{en:"be at stake",ja:"危機にさらされている",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"The company's reputation is at stake.",exJa:"会社の評判が危機にさらされている。"},
{en:"bring about",ja:"〜を引き起こす",pos:"動詞句",cat:"verb",level:"advanced",exEn:"New technology can bring about significant social change.",exJa:"新技術は大きな社会変化をもたらすことができる。"},
{en:"call for",ja:"〜を必要とする・〜を要求する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The crisis calls for immediate action.",exJa:"その危機は即座の行動を必要としている。"},
{en:"fall short of",ja:"〜に届かない",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The project fell short of the expected goals.",exJa:"そのプロジェクトは期待された目標に届かなかった。"},
{en:"take into account",ja:"〜を考慮する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The judge took all the evidence into account.",exJa:"裁判官はすべての証拠を考慮した。"},
{en:"bear in mind",ja:"〜を心に留める",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Bear in mind that the deadline is strict.",exJa:"締め切りは厳守であることを心に留めておきなさい。"},
{en:"keep track of",ja:"〜を把握し続ける",pos:"動詞句",cat:"verb",level:"advanced",exEn:"It is hard to keep track of all the changes.",exJa:"すべての変化を把握し続けることは難しい。"},
{en:"in retrospect",ja:"振り返ってみると",pos:"副詞句",cat:"adv",level:"advanced",exEn:"In retrospect, the decision was the right one.",exJa:"振り返ってみると、その決断は正しいものだった。"},
{en:"to no avail",ja:"効果なく",pos:"副詞句",cat:"adv",level:"advanced",exEn:"They tried to revive the engine but to no avail.",exJa:"彼らはエンジンを復活させようとしたが効果なかった。"},
{en:"by the same token",ja:"同様の理由で",pos:"副詞句",cat:"adv",level:"advanced",exEn:"We must respect others' opinions; by the same token, they should respect ours.",exJa:"私たちは他者の意見を尊重しなければならない。同様に、彼らも私たちの意見を尊重すべきだ。"},
{en:"come to terms with",ja:"〜を受け入れる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"It took years to come to terms with his loss.",exJa:"彼の死を受け入れるのに何年もかかった。"},
{en:"run the risk of",ja:"〜の危険を冒す",pos:"動詞句",cat:"verb",level:"advanced",exEn:"By investing in that stock, you run the risk of losing everything.",exJa:"その株に投資することで、すべてを失う危険を冒している。"},
{en:"in proportion to",ja:"〜に比例して",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"Income tends to increase in proportion to experience.",exJa:"収入は経験に比例して増える傾向がある。"},
{en:"with the exception of",ja:"〜を除いて",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"With the exception of John, everyone passed the test.",exJa:"ジョンを除いて、全員が試験に合格した。"},
{en:"for all",ja:"〜にもかかわらず",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"For all his wealth, he was not happy.",exJa:"豊かさにもかかわらず、彼は幸せではなかった。"},
{en:"nothing but",ja:"〜にすぎない",pos:"副詞句",cat:"adv",level:"advanced",exEn:"He is nothing but a coward.",exJa:"彼は臆病者にすぎない。"},
{en:"anything but",ja:"決して〜でない",pos:"副詞句",cat:"adv",level:"advanced",exEn:"The job was anything but easy.",exJa:"その仕事は決して簡単ではなかった。"},
{en:"none other than",ja:"ほかならぬ〜",pos:"副詞句",cat:"adv",level:"advanced",exEn:"The winner was none other than the youngest competitor.",exJa:"優勝者はほかならぬ最年少の競技者だった。"},
{en:"so much so that",ja:"それほど〜なので",pos:"接続詞的",cat:"conj",level:"advanced",exEn:"He was exhausted, so much so that he slept for 12 hours.",exJa:"彼は疲れ果てていた。それほどまでに、12時間も眠った。"},
{en:"take precedence over",ja:"〜に優先する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Safety must take precedence over speed.",exJa:"安全は速度に優先しなければならない。"},
{en:"draw on",ja:"〜を活用する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"She drew on her years of experience to solve the problem.",exJa:"彼女は問題を解くために長年の経験を活用した。"},
{en:"stand to reason",ja:"〜は当然だ",pos:"動詞句",cat:"verb",level:"advanced",exEn:"It stands to reason that practice makes perfect.",exJa:"練習が完璧につながるのは当然のことだ。"},
{en:"be indicative of",ja:"〜を示している",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"This trend is indicative of a deeper social change.",exJa:"この傾向はより深い社会変化を示している。"},
{en:"lend itself to",ja:"〜に向いている",pos:"動詞句",cat:"verb",level:"advanced",exEn:"This material lends itself to recycling.",exJa:"この材料はリサイクルに向いている。"},
{en:"call into question",ja:"〜に疑問を呈する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The new evidence calls the previous findings into question.",exJa:"新たな証拠が以前の発見に疑問を呈している。"},
{en:"put forward",ja:"〜を提案する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"She put forward a new theory at the conference.",exJa:"彼女は会議で新しい理論を提案した。"},
{en:"give way to",ja:"〜に道を譲る・〜に取って代わられる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Steam engines gave way to electric ones.",exJa:"蒸気機関は電気機関に取って代わられた。"},
{en:"make allowance for",ja:"〜を考慮に入れる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The plan should make allowance for unexpected delays.",exJa:"その計画は予期せぬ遅れを考慮に入れるべきだ。"},
{en:"leave much to be desired",ja:"不満が残る",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The quality of the work leaves much to be desired.",exJa:"その作業の品質は不満が残る。"},
{en:"hold true",ja:"当てはまる・真実である",pos:"動詞句",cat:"verb",level:"advanced",exEn:"This principle holds true in most cases.",exJa:"この原則はほとんどの場合に当てはまる。"},
{en:"be at odds with",ja:"〜と対立している",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"His statement is at odds with the facts.",exJa:"彼の発言は事実と矛盾している。"},
{en:"with the aim of",ja:"〜することを目的として",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"She studied abroad with the aim of mastering French.",exJa:"彼女はフランス語をマスターすることを目的として留学した。"},
{en:"make light of",ja:"〜を軽視する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Don't make light of the risks involved.",exJa:"関連するリスクを軽視してはいけない。"},
{en:"make much of",ja:"〜を重視する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Japanese culture makes much of politeness.",exJa:"日本の文化は礼儀を重視する。"},
{en:"in the face of",ja:"〜に直面して",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"She remained calm in the face of adversity.",exJa:"彼女は逆境に直面しても冷静さを保った。"},
{en:"at the expense of",ja:"〜を犠牲にして",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"Economic growth came at the expense of the environment.",exJa:"経済成長は環境を犠牲にしてもたらされた。"},
{en:"in the event of",ja:"〜の場合に",pos:"前置詞句",cat:"prep",level:"advanced",exEn:"In the event of an emergency, call this number.",exJa:"緊急事態の場合は、この番号に電話してください。"},
{en:"fall back on",ja:"〜に頼る（代替案として）",pos:"動詞句",cat:"verb",level:"advanced",exEn:"When all else fails, fall back on your instincts.",exJa:"他のすべてが失敗したとき、本能を頼りにしなさい。"},
{en:"take issue with",ja:"〜に異議を唱える",pos:"動詞句",cat:"verb",level:"advanced",exEn:"I would take issue with that interpretation.",exJa:"その解釈には異議を唱えたい。"},
{en:"be hard pressed to",ja:"〜するのに苦労する",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"I would be hard pressed to find a better solution.",exJa:"それより良い解決策を見つけるのに苦労するだろう。"},
{en:"bear on",ja:"〜に関係する・〜に影響を及ぼす",pos:"動詞句",cat:"verb",level:"advanced",exEn:"His testimony bears directly on the verdict.",exJa:"彼の証言は評決に直接関係する。"},
// 構文・文法（advanced）
{en:"attribute A to B",ja:"AをBのせいにする",pos:"動詞句",cat:"verb",level:"advanced",exEn:"She attributed her success to hard work and determination.",exJa:"彼女は自分の成功を努力と意志の強さのおかげだとした。"},
{en:"deprive A of B",ja:"AからBを奪う",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The illness deprived him of the ability to walk.",exJa:"病気が彼から歩く能力を奪った。"},
{en:"provide A with B",ja:"AにBを提供する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The government should provide citizens with basic healthcare.",exJa:"政府は市民に基本的な医療を提供すべきだ。"},
{en:"prevent A from -ing",ja:"AがBするのを防ぐ",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The rain prevented us from going outside.",exJa:"雨が私たちの外出を防いだ。"},
{en:"remind A of B",ja:"AにBを思い出させる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The smell reminds me of my grandmother's kitchen.",exJa:"そのにおいは祖母の台所を思い出させる。"},
{en:"accuse A of B",ja:"AをBのことで非難する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"He was accused of stealing company funds.",exJa:"彼は会社の資金を横領したとして告訴された。"},
{en:"distinguish A from B",ja:"AをBと区別する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"It is important to distinguish fact from opinion.",exJa:"事実と意見を区別することが重要だ。"},
{en:"associate A with B",ja:"AをBと関連付ける",pos:"動詞句",cat:"verb",level:"advanced",exEn:"People tend to associate success with hard work.",exJa:"人は成功を努力と関連付ける傾向がある。"},
{en:"identify A with B",ja:"AをBと同一視する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Many people identify wealth with happiness.",exJa:"多くの人が富を幸福と同一視する。"},
{en:"expose A to B",ja:"AをBにさらす",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Children should be exposed to different cultures.",exJa:"子供たちはさまざまな文化にさらされるべきだ。"},
{en:"rob A of B",ja:"AからBを奪う",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The accident robbed him of his sight.",exJa:"事故が彼から視力を奪った。"},
{en:"inform A of B",ja:"AにBを知らせる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"Please inform us of any changes to your schedule.",exJa:"スケジュールの変更があればお知らせください。"},
{en:"convince A of B",ja:"AにBを確信させる",pos:"動詞句",cat:"verb",level:"advanced",exEn:"She convinced the committee of the project's value.",exJa:"彼女はそのプロジェクトの価値を委員会に確信させた。"},
{en:"warn A of B",ja:"AにBを警告する",pos:"動詞句",cat:"verb",level:"advanced",exEn:"The doctor warned him of the dangers of smoking.",exJa:"医師は彼に喫煙の危険性を警告した。"},
// 形容詞構文（advanced）
{en:"be prone to",ja:"〜しがちだ",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"He is prone to exaggerating when he is excited.",exJa:"彼は興奮すると誇張しがちだ。"},
{en:"be liable to",ja:"〜しがちだ・〜する可能性がある",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"Wooden structures are liable to catch fire.",exJa:"木造建築は火事になりやすい。"},
{en:"be conducive to",ja:"〜に有益な・〜を促進する",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"A quiet environment is conducive to studying.",exJa:"静かな環境は勉強を促進する。"},
{en:"be detrimental to",ja:"〜に有害な",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"Lack of sleep is detrimental to one's health.",exJa:"睡眠不足は健康に有害だ。"},
{en:"be inherent in",ja:"〜に固有の",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"Risk is inherent in any business venture.",exJa:"リスクはいかなるビジネスの試みにも固有のものだ。"},
{en:"be attributable to",ja:"〜に起因する",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"The decline is attributable to several factors.",exJa:"その衰退はいくつかの要因に起因する。"},
{en:"be tantamount to",ja:"〜に等しい",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"Silence in this context is tantamount to consent.",exJa:"この文脈での沈黙は同意に等しい。"},
{en:"be pertinent to",ja:"〜に関係がある",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"Please make sure your comments are pertinent to the topic.",exJa:"コメントがトピックに関係あることを確認してください。"},
{en:"be commensurate with",ja:"〜に見合った",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"The reward should be commensurate with the effort.",exJa:"報酬は努力に見合ったものであるべきだ。"},
{en:"be contingent on",ja:"〜次第である",pos:"形容詞構文",cat:"adj",level:"advanced",exEn:"The project's success is contingent on adequate funding.",exJa:"そのプロジェクトの成功は十分な資金調達次第だ。"},

{en:"pass on",ja:"〜を伝える・受け渡す",pos:"動詞句",cat:"verb",level:"standard",exEn:"We have a responsibility to pass on our culture to future generations.",exJa:"私たちは文化を次世代に伝える責任がある。"},
{en:"persist in",ja:"〜に固執する・続ける",pos:"動詞句",cat:"verb",level:"standard",exEn:"She persisted in her efforts despite repeated failures.",exJa:"繰り返しの失敗にもかかわらず、彼女は努力を続けた。"},
{en:"pick out",ja:"〜を選び出す・見分ける",pos:"動詞句",cat:"verb",level:"standard",exEn:"Can you pick out the grammatical errors in this sentence?",exJa:"この文の文法的誤りを見分けることができますか？"},
{en:"pick up",ja:"〜を拾う・習得する・回復する",pos:"動詞句",cat:"verb",level:"standard",exEn:"She picked up Japanese remarkably quickly.",exJa:"彼女は驚くほど素早く日本語を習得した。"},
{en:"refrain from",ja:"〜を控える",pos:"動詞句",cat:"verb",level:"standard",exEn:"Please refrain from using your phone during the lecture.",exJa:"講義中の携帯電話の使用を控えてください。"},
{en:"resort to",ja:"〜に頼る・訴える",pos:"動詞句",cat:"verb",level:"standard",exEn:"We should not resort to violence to solve problems.",exJa:"問題解決のために暴力に訴えるべきではない。"},
{en:"rule out",ja:"〜を除外する・可能性を排除する",pos:"動詞句",cat:"verb",level:"standard",exEn:"The doctor ruled out the possibility of cancer.",exJa:"医師はがんの可能性を排除した。"},
{en:"see through",ja:"〜を見抜く・やり遂げる",pos:"動詞句",cat:"verb",level:"standard",exEn:"I could see through his plan immediately.",exJa:"私はすぐに彼の計画を見抜いた。"},
{en:"set in",ja:"（悪い事態が）始まる",pos:"動詞句",cat:"verb",level:"standard",exEn:"Depression set in after he lost his job.",exJa:"仕事を失った後、うつ病が始まった。"},
{en:"stem from",ja:"〜から生じる",pos:"動詞句",cat:"verb",level:"standard",exEn:"Many problems stem from poor communication.",exJa:"多くの問題はコミュニケーション不足から生じる。"},
{en:"succeed in",ja:"〜に成功する",pos:"動詞句",cat:"verb",level:"standard",exEn:"She succeeded in passing the difficult examination.",exJa:"彼女は難しい試験に合格することに成功した。"},
{en:"take on",ja:"〜を引き受ける・雇う",pos:"動詞句",cat:"verb",level:"standard",exEn:"The company decided to take on more staff.",exJa:"会社はより多くのスタッフを雇うことを決めた。"},
{en:"take up",ja:"（時間・空間を）占める・始める",pos:"動詞句",cat:"verb",level:"standard",exEn:"This project takes up most of my time.",exJa:"このプロジェクトは私の時間のほとんどを占める。"},
{en:"wind up",ja:"最終的に〜になる・終わらせる",pos:"動詞句",cat:"verb",level:"standard",exEn:"He wound up living abroad for ten years.",exJa:"彼は最終的に10年間海外で暮らすことになった。"},
{en:"abstain from",ja:"〜を控える・慎む",pos:"動詞句",cat:"verb",level:"standard",exEn:"He abstained from alcohol for health reasons.",exJa:"彼は健康上の理由でアルコールを控えた。"},
{en:"give credit to",ja:"〜を称える・認める",pos:"動詞句",cat:"verb",level:"standard",exEn:"We should give credit to those who made this possible.",exJa:"これを可能にした人たちを称えるべきだ。"},
{en:"lose track of",ja:"〜を見失う",pos:"動詞句",cat:"verb",level:"standard",exEn:"I lost track of time while reading.",exJa:"読書中に時間を見失ってしまった。"},
{en:"put emphasis on",ja:"〜を強調する",pos:"動詞句",cat:"verb",level:"standard",exEn:"The school puts emphasis on critical thinking.",exJa:"その学校は批判的思考を強調している。"},
{en:"owing to",ja:"〜のために（原因）",pos:"前置詞句",cat:"prep",level:"standard",exEn:"The match was cancelled owing to bad weather.",exJa:"悪天候のため、試合はキャンセルされた。"},
{en:"on account of",ja:"〜のために（原因）",pos:"前置詞句",cat:"prep",level:"standard",exEn:"She was absent on account of illness.",exJa:"彼女は病気のため欠席した。"},
{en:"in consequence of",ja:"〜の結果として",pos:"前置詞句",cat:"prep",level:"standard",exEn:"In consequence of the accident, several roads were closed.",exJa:"事故の結果、いくつかの道路が閉鎖された。"},
{en:"as a consequence of",ja:"〜の結果として",pos:"前置詞句",cat:"prep",level:"standard",exEn:"As a consequence of global warming, sea levels are rising.",exJa:"地球温暖化の結果として、海面が上昇している。"},
{en:"on the basis of",ja:"〜に基づいて",pos:"前置詞句",cat:"prep",level:"standard",exEn:"Decisions should be made on the basis of evidence.",exJa:"決定は証拠に基づいて行われるべきだ。"},
{en:"with respect to",ja:"〜に関して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"With respect to your question, I have a few thoughts.",exJa:"あなたの質問に関して、いくつかの考えがある。"},
{en:"in respect of",ja:"〜に関して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"In respect of environmental impact, the plan needs revision.",exJa:"環境への影響に関して、その計画は修正が必要だ。"},
{en:"with reference to",ja:"〜に関して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"With reference to your inquiry, please see the attached document.",exJa:"お問い合わせに関して、添付文書をご参照ください。"},
{en:"in relation to",ja:"〜に関して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"There are several issues in relation to safety.",exJa:"安全性に関していくつかの問題がある。"},
{en:"in connection with",ja:"〜に関連して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"Police are questioning several people in connection with the robbery.",exJa:"警察は強盗に関連していくつかの人物を尋問している。"},
{en:"in line with",ja:"〜と一致して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"The company's policy is in line with international standards.",exJa:"その会社の方針は国際基準と一致している。"},
{en:"in accordance with",ja:"〜に従って",pos:"前置詞句",cat:"prep",level:"standard",exEn:"Please act in accordance with the rules.",exJa:"規則に従って行動してください。"},
{en:"in conflict with",ja:"〜と対立して",pos:"前置詞句",cat:"prep",level:"standard",exEn:"His actions were in conflict with company policy.",exJa:"彼の行動は会社の方針と対立していた。"},
{en:"in contrast to",ja:"〜とは対照的に",pos:"前置詞句",cat:"prep",level:"standard",exEn:"In contrast to his brother, he is very quiet.",exJa:"兄とは対照的に、彼はとても静かだ。"},
{en:"for nothing",ja:"無駄に・無料で",pos:"副詞句",cat:"adv",level:"standard",exEn:"All my hard work was for nothing.",exJa:"私の努力はすべて無駄だった。"},
{en:"by all means",ja:"ぜひとも・もちろん",pos:"副詞句",cat:"adv",level:"standard",exEn:"Please, by all means, feel free to ask questions.",exJa:"ぜひとも、遠慮なく質問してください。"},
{en:"in no way",ja:"決して〜でない",pos:"副詞句",cat:"adv",level:"standard",exEn:"In no way am I suggesting that you are wrong.",exJa:"決してあなたが間違っていると言いたいわけではない。"},
{en:"for the most part",ja:"大部分において",pos:"副詞句",cat:"adv",level:"standard",exEn:"For the most part, the conference was a success.",exJa:"大部分において、その会議は成功だった。"},
{en:"without fail",ja:"必ず・間違いなく",pos:"副詞句",cat:"adv",level:"standard",exEn:"Please attend the meeting without fail.",exJa:"必ず会議に出席してください。"},
{en:"by all accounts",ja:"誰の話によっても",pos:"副詞句",cat:"adv",level:"standard",exEn:"By all accounts, the new restaurant is excellent.",exJa:"誰の話によっても、その新しいレストランは素晴らしいそうだ。"},
{en:"on the grounds of",ja:"〜を理由として",pos:"前置詞句",cat:"prep",level:"standard",exEn:"The case was dismissed on the grounds of insufficient evidence.",exJa:"証拠不十分を理由として、その事件は却下された。"},
{en:"for fear of",ja:"〜を恐れて",pos:"前置詞句",cat:"prep",level:"standard",exEn:"She didn't speak up for fear of making a mistake.",exJa:"間違いをすることを恐れて、彼女は声を上げなかった。"},
{en:"out of curiosity",ja:"好奇心から",pos:"副詞句",cat:"adv",level:"standard",exEn:"Out of curiosity, what made you choose this career?",exJa:"好奇心から聞きますが、なぜこのキャリアを選んだのですか？"},
{en:"out of habit",ja:"習慣で",pos:"副詞句",cat:"adv",level:"standard",exEn:"He checks his phone first thing every morning out of habit.",exJa:"彼は習慣で毎朝まず携帯をチェックする。"},
{en:"in addition",ja:"さらに・加えて",pos:"副詞句",cat:"adv",level:"standard",exEn:"The hotel offers a pool; in addition, there is a gym.",exJa:"そのホテルにはプールがある。さらに、ジムもある。"},
{en:"moreover",ja:"さらに・その上",pos:"副詞句",cat:"adv",level:"standard",exEn:"The plan is cost-effective; moreover, it is environmentally friendly.",exJa:"その計画はコスト効率がよい。さらに、環境にやさしい。"},
{en:"furthermore",ja:"さらに・なおかつ",pos:"副詞句",cat:"adv",level:"standard",exEn:"The study shows clear results; furthermore, it confirms previous findings.",exJa:"その研究は明確な結果を示す。なおかつ、以前の知見を確認する。"},
{en:"nevertheless",ja:"それにもかかわらず",pos:"副詞句",cat:"adv",level:"standard",exEn:"The task was difficult; nevertheless, she completed it.",exJa:"課題は難しかった。それにもかかわらず、彼女はそれを完了した。"},
{en:"consequently",ja:"結果として",pos:"副詞句",cat:"adv",level:"standard",exEn:"He didn't prepare; consequently, he failed the test.",exJa:"彼は準備しなかった。結果として、試験に失敗した。"},
{en:"subsequently",ja:"その後・後になって",pos:"副詞句",cat:"adv",level:"standard",exEn:"He was arrested and subsequently released.",exJa:"彼は逮捕され、その後釈放された。"},
{en:"accordingly",ja:"それに従って・したがって",pos:"副詞句",cat:"adv",level:"standard",exEn:"The budget was reduced; accordingly, the project was scaled back.",exJa:"予算が削減された。それに従って、プロジェクトも縮小された。"},
{en:"hence",ja:"それゆえ",pos:"副詞句",cat:"adv",level:"standard",exEn:"The demand is growing; hence the need for more workers.",exJa:"需要が高まっている。それゆえ、より多くの労働者が必要だ。"},
{en:"thus",ja:"このようにして・したがって",pos:"副詞句",cat:"adv",level:"standard",exEn:"He worked hard and thus achieved his goal.",exJa:"彼は努力した。このようにして目標を達成した。"},
{en:"whereas",ja:"〜であるのに対して",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Some prefer coffee, whereas others prefer tea.",exJa:"コーヒーを好む人がいる一方で、お茶を好む人もいる。"},
{en:"given that",ja:"〜を考慮すると",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Given that time is limited, we must act quickly.",exJa:"時間が限られていることを考慮すると、迅速に行動しなければならない。"},
{en:"assuming that",ja:"〜を仮定すると",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Assuming that the plan works, we will save time.",exJa:"計画がうまくいくと仮定すると、時間を節約できる。"},
{en:"in that",ja:"〜という点で",pos:"接続詞的",cat:"conj",level:"standard",exEn:"This method is superior in that it produces fewer errors.",exJa:"この方法はエラーが少ないという点で優れている。"},
{en:"even if",ja:"たとえ〜でも",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Even if it rains, the event will continue.",exJa:"たとえ雨が降っても、イベントは続くだろう。"},
{en:"even though",ja:"〜であるにもかかわらず",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Even though he was tired, he continued working.",exJa:"疲れていたにもかかわらず、彼は働き続けた。"},
{en:"in so far as",ja:"〜する限り・〜という範囲で",pos:"接続詞的",cat:"conj",level:"standard",exEn:"I will help you in so far as I am able.",exJa:"私にできる限り、あなたを手伝います。"},
{en:"so long as",ja:"〜する限り",pos:"接続詞的",cat:"conj",level:"standard",exEn:"You can stay so long as you follow the rules.",exJa:"規則に従う限り、滞在できます。"},
{en:"only if",ja:"〜の場合にのみ",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Only if you study hard will you succeed.",exJa:"一生懸命勉強した場合にのみ成功するだろう。"},
{en:"seeing that",ja:"〜なので",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Seeing that you have experience, you should apply.",exJa:"経験があることを考えると、応募すべきだ。"},
{en:"suppose that",ja:"〜と仮定すると",pos:"接続詞的",cat:"conj",level:"standard",exEn:"Suppose that you had a million dollars, what would you do?",exJa:"100万ドルあると仮定すると、あなたはどうしますか？"},
{en:"to the point",ja:"的確な・要を得た",pos:"副詞句",cat:"adv",level:"standard",exEn:"His answer was brief and to the point.",exJa:"彼の答えは簡潔で的確だった。"},
{en:"beside the point",ja:"的外れな",pos:"副詞句",cat:"adv",level:"standard",exEn:"That argument is completely beside the point.",exJa:"その議論は完全に的外れだ。"},
{en:"by contrast",ja:"対照的に",pos:"副詞句",cat:"adv",level:"standard",exEn:"Japan's birth rate is low. By contrast, India's is high.",exJa:"日本の出生率は低い。対照的に、インドの出生率は高い。"},
{en:"in spite of the fact that",ja:"〜という事実にもかかわらず",pos:"接続詞的",cat:"conj",level:"standard",exEn:"In spite of the fact that she worked hard, she didn't pass.",exJa:"頑張ったという事実にもかかわらず、彼女は合格しなかった。"},
{en:"due to the fact that",ja:"〜という事実のために",pos:"接続詞的",cat:"conj",level:"standard",exEn:"The event was postponed due to the fact that the speaker was ill.",exJa:"演者が病気だという事実のため、イベントは延期された。"},
// ─ have 系（basic）─
{en:"have difficulty",ja:"〜するのに苦労する",pos:"動詞句",cat:"verb",level:"basic",exEn:"Many students have difficulty understanding this concept.",exJa:"多くの生徒がこの概念を理解するのに苦労する。"},
{en:"have access to",ja:"〜にアクセスできる",pos:"動詞句",cat:"verb",level:"basic",exEn:"Not everyone has access to quality education.",exJa:"質の高い教育へのアクセスは万人にあるわけではない。"},
{en:"have something to do with",ja:"〜と何らかの関係がある",pos:"動詞句",cat:"verb",level:"basic",exEn:"Her illness may have something to do with stress.",exJa:"彼女の病気はストレスと何らかの関係があるかもしれない。"},
{en:"have nothing to do with",ja:"〜とまったく関係ない",pos:"動詞句",cat:"verb",level:"basic",exEn:"This problem has nothing to do with money.",exJa:"この問題はお金とはまったく関係ない。"},
{en:"have confidence in",ja:"〜を信頼している",pos:"動詞句",cat:"verb",level:"basic",exEn:"You should have confidence in your own abilities.",exJa:"自分自身の能力に自信を持つべきだ。"},
{en:"have faith in",ja:"〜を信じている",pos:"動詞句",cat:"verb",level:"basic",exEn:"I have faith in your judgment.",exJa:"私はあなたの判断を信じている。"},
{en:"have respect for",ja:"〜を尊重する",pos:"動詞句",cat:"verb",level:"basic",exEn:"We should have respect for different cultures.",exJa:"私たちは異なる文化を尊重すべきだ。"},
{en:"have influence on",ja:"〜に影響を与える",pos:"動詞句",cat:"verb",level:"basic",exEn:"Parents have a great influence on their children.",exJa:"親は子供に大きな影響を与える。"},
{en:"have impact on",ja:"〜に影響を与える",pos:"動詞句",cat:"verb",level:"basic",exEn:"Climate change has a major impact on biodiversity.",exJa:"気候変動は生物多様性に大きな影響を与えている。"},
// ─ make 系（basic）─
{en:"make an effort",ja:"努力する",pos:"動詞句",cat:"verb",level:"basic",exEn:"You need to make a greater effort to improve.",exJa:"あなたは向上するためにもっと努力する必要がある。"},
{en:"make progress",ja:"進歩する",pos:"動詞句",cat:"verb",level:"basic",exEn:"She has made significant progress in her studies.",exJa:"彼女は学業において著しい進歩を遂げた。"},
{en:"make a mistake",ja:"間違いをおかす",pos:"動詞句",cat:"verb",level:"basic",exEn:"Everyone makes mistakes; the key is to learn from them.",exJa:"誰でも間違いをおかす。重要なのはそこから学ぶことだ。"},
{en:"make a decision",ja:"決定を下す",pos:"動詞句",cat:"verb",level:"basic",exEn:"It's time to make a final decision.",exJa:"最終決定を下す時だ。"},
{en:"make an exception",ja:"例外を設ける",pos:"動詞句",cat:"verb",level:"basic",exEn:"We cannot make an exception in this case.",exJa:"この場合は例外を設けることができない。"},
{en:"make a living",ja:"生計を立てる",pos:"動詞句",cat:"verb",level:"basic",exEn:"He makes a living as a freelance writer.",exJa:"彼はフリーライターとして生計を立てている。"},
{en:"make a point of",ja:"必ず〜する",pos:"動詞句",cat:"verb",level:"basic",exEn:"She makes a point of reading every day.",exJa:"彼女は必ず毎日読書する。"},
{en:"make the best of",ja:"〜を最大限に利用する",pos:"動詞句",cat:"verb",level:"basic",exEn:"We should make the best of the situation we're in.",exJa:"今置かれた状況を最大限に活用すべきだ。"},
// ─ take 系（basic）─
{en:"take action",ja:"行動を取る",pos:"動詞句",cat:"verb",level:"basic",exEn:"We must take action to address climate change.",exJa:"気候変動に対処するために行動を取らなければならない。"},
{en:"take effect",ja:"効力を発する",pos:"動詞句",cat:"verb",level:"basic",exEn:"The new law will take effect next April.",exJa:"新しい法律は来年4月に効力を発する。"},
{en:"take notice of",ja:"〜に注意を払う",pos:"動詞句",cat:"verb",level:"basic",exEn:"He takes no notice of criticism.",exJa:"彼は批判に注意を払わない。"},
{en:"take pride in",ja:"〜を誇りに思う",pos:"動詞句",cat:"verb",level:"basic",exEn:"She takes great pride in her work.",exJa:"彼女は自分の仕事を非常に誇りに思っている。"},
{en:"take the place of",ja:"〜の代わりをする",pos:"動詞句",cat:"verb",level:"basic",exEn:"Nothing can take the place of human connection.",exJa:"何も人とのつながりの代わりにはなれない。"},
{en:"take turns",ja:"交代で〜する",pos:"動詞句",cat:"verb",level:"basic",exEn:"The students took turns presenting their projects.",exJa:"生徒たちは交代でプロジェクトを発表した。"},
{en:"take responsibility for",ja:"〜に責任を持つ",pos:"動詞句",cat:"verb",level:"basic",exEn:"You must take responsibility for your own actions.",exJa:"自分自身の行動に責任を持たなければならない。"},
{en:"take steps to",ja:"〜するための手段を講じる",pos:"動詞句",cat:"verb",level:"basic",exEn:"The government must take steps to reduce poverty.",exJa:"政府は貧困を減らすための手段を講じなければならない。"},
{en:"take measures to",ja:"〜するための措置を講じる",pos:"動詞句",cat:"verb",level:"basic",exEn:"Schools should take measures to prevent bullying.",exJa:"学校はいじめを防ぐための措置を講じるべきだ。"},
{en:"take a stand",ja:"立場を明確にする",pos:"動詞句",cat:"verb",level:"basic",exEn:"It's time to take a stand against injustice.",exJa:"不正義に反対する立場を明確にするべき時だ。"},
// ─ give 系（basic）─
{en:"give an account of",ja:"〜を説明する",pos:"動詞句",cat:"verb",level:"basic",exEn:"Please give a brief account of what happened.",exJa:"何が起きたか簡単に説明してください。"},
{en:"give priority to",ja:"〜を優先する",pos:"動詞句",cat:"verb",level:"basic",exEn:"The government should give priority to education.",exJa:"政府は教育を優先すべきだ。"},
{en:"give thought to",ja:"〜を考慮する",pos:"動詞句",cat:"verb",level:"basic",exEn:"Give careful thought to this decision before acting.",exJa:"行動する前にこの決断についてよく考えなさい。"},
{en:"give in to",ja:"〜に屈する",pos:"動詞句",cat:"verb",level:"basic",exEn:"Don't give in to temptation.",exJa:"誘惑に屈してはいけない。"},
{en:"speak well of",ja:"〜を褒める",pos:"動詞句",cat:"verb",level:"basic",exEn:"She always speaks well of her colleagues.",exJa:"彼女はいつも同僚のことをよく言う。"},
{en:"speak ill of",ja:"〜の悪口を言う",pos:"動詞句",cat:"verb",level:"basic",exEn:"You should never speak ill of the dead.",exJa:"亡くなった人の悪口を言うべきではない。"},
{en:"think well of",ja:"〜を高く評価する",pos:"動詞句",cat:"verb",level:"basic",exEn:"His colleagues think well of his work ethic.",exJa:"同僚は彼の仕事への姿勢を高く評価している。"},
{en:"think much of",ja:"〜を高く評価する",pos:"動詞句",cat:"verb",level:"basic",exEn:"The critics don't think much of his latest novel.",exJa:"批評家たちは彼の最新小説をあまり評価していない。"},
// ─ come 系（basic）─
{en:"come true",ja:"実現する",pos:"動詞句",cat:"verb",level:"basic",exEn:"Her dream of becoming a doctor finally came true.",exJa:"医者になるという彼女の夢がついに実現した。"},
{en:"come to an end",ja:"終わりを迎える",pos:"動詞句",cat:"verb",level:"basic",exEn:"The long conflict finally came to an end.",exJa:"長い紛争がついに終わりを迎えた。"},
{en:"come to a conclusion",ja:"結論に達する",pos:"動詞句",cat:"verb",level:"basic",exEn:"After much discussion, they came to a conclusion.",exJa:"多くの議論の末、彼らは結論に達した。"},

const _ac = new (window.AudioContext || window.webkitAudioContext)();
function _tone(freq,type,dur,vol,fade=true){
  const o=_ac.createOscillator(),g=_ac.createGain();
  o.connect(g);g.connect(_ac.destination);
  o.type=type;o.frequency.setValueAtTime(freq,_ac.currentTime);
  g.gain.setValueAtTime(vol,_ac.currentTime);
  if(fade)g.gain.exponentialRampToValueAtTime(0.001,_ac.currentTime+dur);
  o.start(_ac.currentTime);o.stop(_ac.currentTime+dur);
}
function resumeAC(){if(_ac.state==='suspended')_ac.resume();}
function seCorrect(){_tone(600,'sine',0.12,0.12);setTimeout(()=>_tone(900,'sine',0.18,0.12),80);}
function seWrong(){_tone(280,'sine',0.18,0.1);}
function seMaster(){_tone(600,'sine',0.15,0.13);setTimeout(()=>_tone(750,'sine',0.15,0.13),100);setTimeout(()=>_tone(900,'sine',0.25,0.13),200);}
